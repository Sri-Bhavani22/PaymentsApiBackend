spring:
  application:
    name: payment-orchestration
  
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # Cache Configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=24h

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Application Configuration
payment:
  # Retry Configuration
  retry:
    max-attempts: 3
    initial-delay-ms: 1000
    max-delay-ms: 10000
    multiplier: 2.0
  
  # Idempotency Configuration
  idempotency:
    ttl-hours: 24
  
  # Provider Configuration
  providers:
    provider-a:
      name: PROVIDER_A
      base-url: https://provider-a.example.com
      timeout-ms: 5000
      enabled: true
    provider-b:
      name: PROVIDER_B
      base-url: https://provider-b.example.com
      timeout-ms: 5000
      enabled: true
  
  # Routing Rules
  routing:
    rules:
      CARD: PROVIDER_A
      UPI: PROVIDER_B
      NET_BANKING: PROVIDER_A
      WALLET: PROVIDER_B
    failover:
      PROVIDER_A: PROVIDER_B
      PROVIDER_B: PROVIDER_A

# Logging Configuration
logging:
  level:
    root: INFO
    com.payment.orchestration: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: jdbc:postgresql://localhost:5432/paymentdb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.payment.orchestration: INFO
    org.hibernate.SQL: WARN
